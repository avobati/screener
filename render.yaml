services:
  - type: web
    name: screener-backend
    env: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip"
    startCommand: "HOST=0.0.0.0 PORT=$PORT python -m app.server"
    envVars:
      - key: TV_WEBHOOK_SECRET
        sync: false
      - key: CORS_ALLOW_ORIGIN
        value: https://avobati.github.io
      - key: TV_DB_PATH
        value: /tmp/tradingview_signals.db
      - key: SCAN_DB_PATH
        value: /tmp/scanner_results.db
      - key: ENABLE_BACKGROUND_SCANNER
        value: "true"
      - key: SCAN_MODE
        value: "staggered"
      - key: SCAN_STAGGER_GROUPS
        value: "us-stocks-a,us-stocks-b,us-stocks-c,us-stocks-d,us-etfs,crypto-major,crypto-alt,metals"
      - key: SCAN_INTERVAL_MINUTES
        value: "60"
      - key: SCAN_REQUEST_DELAY_MS
        value: "1300"
      - key: RUN_SCAN_ON_START
        value: "true"
      - key: HOST
        value: 0.0.0.0
